<div class="w-full max-w-md">
<!-- Header -->
<div class="mb-12">
<div class="mb-8">
<img alt="UJELADEA Logo" class="h-12 w-auto" onerror="this.outerHTML='&lt;span class=\'font-display-lg-mobile text-headline-xl text-on-surface font-bold\'&gt;UJELADEA&lt;/span&gt;'" src="https://lh3.googleusercontent.com/aida/AP1WRLurwuQUvOxDDPzVxCKV5CNrwK7GVE1A2opl0Vw40CMAJa_X5W5CRAcoianX_FS0SFPBKbIjP4P5dxkwSE1e2qUvp0jcgQapdNqR_VXAoK3-NYkXIsm6WJXrM2Uxtc82Gb7nhbU13kmDsP0ouku79Tyh7-PSDGkapkZp1LiPnFzWy_eeskOgqR8s2jtw2PBPxmmRwCV2EoMUI0SOVbGaS90nH3L_ozeedtKdQz2DXnrob0AYK8-PAke6Ccg"/>
</div>
<h1 class="font-headline-xl text-headline-xl-mobile sm:text-headline-xl text-on-surface mb-3 tracking-tight">Bienvenido de vuelta</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Inicia sesión en tu cuenta para continuar.</p>
</div>
<!-- Login Form -->
<form action="#" class="space-y-6" method="POST">
<!-- Email Field -->
<div>
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-2 uppercase tracking-wider" for="email">Correo Electrónico</label>
<div class="relative input-focus-ring border border-[#27272a] rounded-lg bg-glass-bg backdrop-blur-sm overflow-hidden transition-colors duration-300">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant text-xl" data-icon="mail">mail</span>
</div>
<input class="block w-full pl-12 pr-4 py-3.5 bg-transparent border-none text-on-surface placeholder-on-surface-variant/50 focus:ring-0 sm:text-body-md" id="email" name="email" placeholder="ejemplo@correo.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div>
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-2 uppercase tracking-wider" for="password">Contraseña</label>
<div class="relative input-focus-ring border border-[#27272a] rounded-lg bg-glass-bg backdrop-blur-sm overflow-hidden transition-colors duration-300">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant text-xl" data-icon="lock">lock</span>
</div>
<input class="block w-full pl-12 pr-12 py-3.5 bg-transparent border-none text-on-surface placeholder-on-surface-variant/50 focus:ring-0 sm:text-body-md" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<div class="absolute inset-y-0 right-0 pr-4 flex items-center">
<button class="text-on-surface-variant hover:text-on-surface focus:outline-none transition-colors duration-200" type="button">
<span class="material-symbols-outlined text-xl" data-icon="visibility_off">visibility_off</span>
</button>
</div>
</div>
</div>
<!-- Forgot Password Link -->
<div class="flex items-center justify-end">
<a class="font-body-md text-sm text-on-surface-variant hover:text-primary transition-colors duration-200" href="#">¿Olvidaste tu contraseña?</a>
</div>
<!-- Submit Button -->
<button class="w-full flex justify-center py-4 px-4 border border-transparent rounded-lg shadow-sm font-headline-md text-body-lg text-white bg-[#8f1937] hover:bg-[#a81c40] hover:shadow-[0_0_20px_rgba(143,25,55,0.4)] focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-[#8f1937] focus:ring-offset-[#09090b] transition-all duration-300 font-semibold" type="submit">
                    Iniciar sesión
                </button>
</form>
<!-- Registration Link -->
<div class="mt-8 text-center border-t border-[#27272a] pt-8">
<p class="font-body-md text-body-md text-on-surface-variant">
                    ¿No tienes una cuenta? 
                    <a class="font-headline-md text-body-md text-primary hover:text-white transition-colors duration-200 ml-1 font-semibold" href="#">Regístrate</a>
</p>
</div>
